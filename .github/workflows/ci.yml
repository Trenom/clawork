name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml
          pip install pytest pytest-cov ruff mypy

      - name: Create test config
        run: cp config/config.example.yaml config.yaml

      - name: Run unit tests
        env:
          CLAW_HOME: ${{ github.workspace }}/claw_test
        run: |
          mkdir -p "$CLAW_HOME"/{inbox,outbox,sessions,logs}
          cp config/config.example.yaml "$CLAW_HOME/config.yaml"
          python tests/test_router.py
          python tests/test_soul.py
          python tests/test_sessions.py

      - name: Run pytest (if any pytest-compatible tests exist)
        env:
          CLAW_HOME: ${{ github.workspace }}/claw_test
        run: |
          pytest tests/ --ignore=tests/test-integration.py -v --tb=short 2>/dev/null || true

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools
        run: pip install ruff

      - name: Ruff check
        run: ruff check .

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    continue-on-error: true  # Engine has legacy shadowing to clean up post-beta

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools
        run: |
          pip install mypy pyyaml types-PyYAML

      - name: Mypy (engine)
        run: mypy scripts/clawork-engine.py --ignore-missing-imports
